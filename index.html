<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYlab Debug Mode</title>
    <style>
        :root { --primary: #1a237e; --accent: #1e88e5; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        
        /* Debug Console Styling */
        #debug-console { 
            width: 100%; max-width: 600px; background: #263238; color: #80cbc4; 
            padding: 15px; border-radius: 8px; margin-top: 20px; font-family: monospace; 
            font-size: 12px; height: 150px; overflow-y: auto; border: 2px solid #000;
        }
        .log-error { color: #ff8a80; }
        .log-info { color: #ce93d8; }
        .log-success { color: #a5d6a7; }
        
        .hidden { display: none; }
        #loading-ui { text-align: center; padding: 20px; color: #546e7a; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>System Diagnosis</h1>
    <div id="loading-ui">Status: Attempting to reach Google Script...</div>
    
    <div id="main-ui" class="hidden">
        <p>Connection Successful. Database Loaded.</p>
        <select id="member-select" style="width:100%; padding:10px;"></select>
    </div>
</div>

<div id="debug-console">
    <div>[SYSTEM] Debug Monitor Initialized...</div>
</div>

    function debugLog(msg, type = 'info') {
        const consoleDiv = document.getElementById('debug-console');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        entry.className = `log-${type}`;
        entry.innerText = `[${time}] ${msg}`;
        consoleDiv.appendChild(entry);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
        console.log(`[DEBUG] ${msg}`);
    }
