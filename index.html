<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMElab Cleanup</title>
    <link rel="stylesheet" href="./annotorious.min.css">
    <style>
        :root { --primary: #1a237e; --accent: #1e88e5; --success: #2e7d32; --warning: #d32f2f; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; overflow: hidden; }
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #dcdfe3; overflow-y: auto; padding: 20px; flex-shrink: 0; }
        #sidebar h2 { margin-top: 0; color: var(--primary); font-size: 1.4rem; border-bottom: 3px solid var(--primary); padding-bottom: 8px; }
        .thumb-card { background: #fff; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; position: relative; }
        .thumb-card.processed { border: 3px solid var(--success) !important; background: #e8f5e9; }
        .thumb-card.processed::after { content: '✓ Done'; position: absolute; top: 5px; right: 5px; background: var(--success); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
        .thumb-card img { width: 100%; height: 110px; object-fit: cover; border-bottom: 1px solid #eee; pointer-events: none; }
        .thumb-info { padding: 8px; font-size: 13px; text-align: center; font-weight: bold; color: #455a64; }
        #main-container { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        #status-bar { padding: 10px 25px; border-radius: 30px; background: #fff; border: 1px solid #cfd8dc; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); align-self: center; margin-bottom: 15px; min-width: 220px; text-align: center; }
        .saving { color: #f57c00; animation: pulse 1.5s infinite; }
        #workspace { display: flex; gap: 20px; align-items: flex-start; justify-content: center; height: 85vh; }
        #canvas-box { position: relative; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        #current-img { max-width: 100%; max-height: 70vh; display: block; border-radius: 4px; }
        #input-panel { width: 340px; background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #cfd8dc; display: none; }
        .radio-group { display: flex; flex-direction: column; gap: 14px; }
        .radio-option { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; font-size: 14px; padding: 8px; border-radius: 6px; }
        #intro-overlay { text-align: center; max-width: 650px; background: #fff; padding: 40px; border-radius: 15px; margin-top: 40px; border-top: 8px solid var(--primary); }
        .warning-text { color: var(--warning); font-weight: bold; margin: 25px 0; border: 2px dashed var(--warning); padding: 15px; border-radius: 8px; background: #fff8f8; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>NMElab Cleanup</h2>
    <div id="thumb-list"></div>
</div>

<div id="main-container">
    <div id="status-bar">Connecting...</div>
    <div id="workspace">
        <div id="intro-overlay">
            <h1>NMElab Cleanup</h1>
            <p>Help identify samples in Jing's lab.</p>
            <div class="warning-text">Wait for the orange pulse to finish before switching images!</div>
            <p id="loading-msg">Fetching progress...</p>
        </div>
        <div id="canvas-box"></div>
        <div id="input-panel">
            <h3 style="margin:0 0 15px 0; color:var(--primary)">Sample Status</h3>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="status" onclick="saveStatus('Toss everything')"><span>Toss everything.</span></label>
                <label class="radio-option"><input type="radio" name="status" onclick="saveStatus('Keep some things')"><span>Keep some things.</span></label>
                <label class="radio-option"><input type="radio" name="status" onclick="saveStatus('Potentially useful')"><span>Might be useful.</span></label>
                <label class="radio-option"><input type="radio" name="status" onclick="saveStatus('Unknown/Not mine')"><span>I don't know this.</span></label>
            </div>
        </div>
    </div>
</div>

<script src="./annotorious.min.js"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmUOcFf_etsl0jDxH8hAQT01_mazbcO03WvfNNhlWB9XHmbWDfb5wSm24gwslG0Pnt/exec';
    const FOLDER = './images'; 
    let anno = null;
    let currentActiveId = null; // Guard against image cycling

    async function initGallery() {
        const list = document.getElementById('thumb-list');
        const status = document.getElementById('status-bar');
        try {
            const res = await fetch(`${SCRIPT_URL}?imageId=ALL_SAMPLES`);
            const allData = await res.json();
            const processedIds = new Set(allData.filter(d => d.type === "StatusUpdate").map(d => d.imageId));
            renderCards(processedIds);
            status.innerText = "Gallery Ready";
            document.getElementById('loading-msg').innerText = "← Select a sample.";
        } catch (e) {
            renderCards(new Set());
            status.innerText = "Ready (Offline)";
        }
    }

    function renderCards(processedIds) {
        const list = document.getElementById('thumb-list');
        list.innerHTML = ''; 
        for (let i = 1; i <= 57; i++) {
            const id = `Sample ${i}`;
            const card = document.createElement('div');
            card.id = `card-${i}`;
            card.className = 'thumb-card' + (processedIds.has(id) ? ' processed' : '');
            card.innerHTML = `<img src="${FOLDER}/${i}a.jpg" onerror="this.parentElement.style.display='none'"><div class="thumb-info">${id}</div>`;
            card.onclick = () => selectImage(id, `${FOLDER}/${i}.jpg`, i);
            list.appendChild(card);
        }
    }

    async function selectImage(id, imgUrl, index) {
        currentActiveId = id; // Set global ID for this specific request
        const status = document.getElementById('status-bar');
        const canvasBox = document.getElementById('canvas-box');
        const intro = document.getElementById('intro-overlay');
        const panel = document.getElementById('input-panel');

        intro.style.display = 'none';
        canvasBox.style.display = 'block';
        panel.style.display = 'block';
        document.querySelectorAll('input[name="status"]').forEach(r => r.checked = false);

        status.innerText = `Loading ${id}...`;
        status.classList.remove("saving");

        // Force cleanup of old layer
        if (anno) { 
            try { anno.destroy(); } catch(e) {} 
            anno = null; 
        }
        
        canvasBox.innerHTML = ''; 
        const img = document.createElement('img');
        img.id = "current-img";
        canvasBox.appendChild(img);

        img.onload = async () => {
            // Verify we are still on the same image after loading
            if (currentActiveId !== id) return;

            anno = Annotorious.init({ image: img, widgets: ['COMMENT'] });

            try {
                const res = await fetch(`${SCRIPT_URL}?imageId=${id}`);
                const data = await res.json();
                
                // FINAL GUARD: Only apply if user hasn't clicked a new image while fetching
                if (currentActiveId === id) {
                    const drawings = data.filter(d => d.type !== "StatusUpdate");
                    anno.setAnnotations(drawings);
                    status.innerText = `Viewing: ${id}`;
                }
            } catch (e) { status.innerText = `Ready: ${id}`; }

            anno.on('createAnnotation', (a) => syncToSheet(id, a));
        };
        img.src = imgUrl;
    }

    async function syncToSheet(id, content) {
        const status = document.getElementById('status-bar');
        status.innerText = "Saving...";
        status.classList.add("saving");
        const params = new URLSearchParams();
        params.append('imageId', id);
        params.append('annotation', JSON.stringify(content));
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params.toString() });
        status.innerText = "Saved!";
        status.classList.remove("saving");
    }

    async function saveStatus(label) {
        const status = document.getElementById('status-bar');
        status.innerText = "Saving Choice...";
        status.classList.add("saving");
        const match = currentActiveId.match(/\d+/);
        if(match) document.getElementById(`card-${match[0]}`).classList.add('processed');

        const params = new URLSearchParams();
        params.append('imageId', currentActiveId);
        params.append('annotation', JSON.stringify({type: "StatusUpdate", body: label, imageId: currentActiveId}));
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params.toString() });
        status.innerText = "Choice Saved!";
        status.classList.remove("saving");
    }

    initGallery();
</script>
</body>
</html>
