<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYlab Research Gallery</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@recogito/annotorious@2.7.2/dist/annotorious.min.css">
    
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #eceff1; overflow: hidden; }
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #cfd8dc; overflow-y: auto; padding: 20px; z-index: 10; }
        .thumb-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 15px; cursor: pointer; overflow: hidden; }
        .thumb-card img { width: 100%; height: 120px; object-fit: cover; pointer-events: none; }
        .thumb-info { padding: 8px; font-size: 13px; text-align: center; font-weight: bold; }
        #main-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow: hidden; position: relative; }
        #status-bar { margin-bottom: 15px; padding: 8px 20px; border-radius: 20px; background: #fff; border: 1px solid #cfd8dc; font-size: 14px; }
        #canvas-box { position: relative; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #current-img { max-width: 100%; max-height: 70vh; display: block; }
        #debug-box { position: absolute; bottom: 10px; right: 10px; width: 350px; height: 120px; background: #263238; color: #81c784; padding: 10px; font-family: monospace; font-size: 11px; overflow-y: auto; border-radius: 5px; opacity: 0.9; }
        .err { color: #ff5252; font-weight: bold; }
        .a9s-annotationlayer { pointer-events: all !important; cursor: crosshair !important; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-top:0;">Gallery</h2>
    <div id="thumb-list"></div>
</div>

<div id="main-container">
    <div id="status-bar">Select a sample to begin</div>
    <div id="canvas-box"></div>
    <div id="debug-box">System Initializing...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@recogito/annotorious@2.7.2/dist/annotorious.all.min.js"></script>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXvg5bavLy1vOyLh-BrLe6PiTfsJyqnnCi-XtVqhYrAOHragk54ciwsNrqAQsUMS0g/exec';
    const FOLDER = 'images'; 
    let anno = null;
    let activeId = null;

    function debug(msg, isError = false) {
        const box = document.getElementById('debug-box');
        const span = document.createElement('div');
        if(isError) span.className = 'err';
        span.innerText = `> ${msg}`;
        box.appendChild(span);
        box.scrollTop = box.scrollHeight;
    }

    // Check if library loaded immediately
    window.onload = () => {
        if (typeof Annotorious === 'undefined') {
            debug("FATAL: Library failed to load from CDN. Check your internet or firewall.", true);
        } else {
            debug("Annotorious Library connected successfully.");
        }
    };

    // 1. GENERATE SIDEBAR
    const list = document.getElementById('thumb-list');
    for (let i = 1; i <= 57; i++) {
        const card = document.createElement('div');
        card.className = 'thumb-card';
        card.innerHTML = `<img src="${FOLDER}/${i}a.jpg" onerror="this.parentElement.style.display='none'"><div class="thumb-info">Sample ${i}</div>`;
        card.onclick = () => selectImage(`Sample ${i}`, `${FOLDER}/${i}.jpg`);
        list.appendChild(card);
    }

    // 2. IMAGE SELECTION
    function selectImage(id, imgUrl) {
        activeId = id;
        const status = document.getElementById('status-bar');
        const canvasBox = document.getElementById('canvas-box');
        
        debug(`Selecting ${id}...`);
        
        if (anno) {
            anno.destroy();
            anno = null;
        }

        canvasBox.innerHTML = ''; 
        const newImg = document.createElement('img');
        newImg.id = "current-img";
        
        newImg.onload = function() {
            debug(`Image ${id} loaded (${newImg.naturalWidth}px wide).`);
            
            // Re-verify library before init
            if (typeof Annotorious === 'undefined') {
                debug("ERROR: Cannot init - Library missing.", true);
                return;
            }

            setTimeout(() => {
                try {
                    anno = Annotorious.init({ 
                        image: newImg,
                        widgets: ['COMMENT']
                    });
                    debug("Interaction layer attached!");

                    status.innerText = `Loading annotations...`;
                    fetch(`${SCRIPT_URL}?imageId=${activeId}`)
                        .then(r => r.json())
                        .then(data => {
                            anno.setAnnotations(data);
                            status.innerText = `Ready: ${id} (${data.length} annotations)`;
                            debug(`Success: ${data.length} marks loaded.`);
                        });

                    anno.on('createAnnotation', async (a) => {
                        status.innerText = "Saving...";
                        await fetch(SCRIPT_URL, { 
                            method: 'POST', 
                            mode: 'no-cors', 
                            body: JSON.stringify({ imageId: activeId, annotation: a }) 
                        });
                        status.innerText = "Saved!";
                    });

                } catch (err) {
                    debug("INIT FAILED: " + err.message, true);
                }
            }, 200);
        };

        newImg.onerror = () => debug(`404: Could not find ${imgUrl}`, true);
        canvasBox.appendChild(newImg);
        newImg.src = imgUrl;
    }
</script>
</body>
</html>
