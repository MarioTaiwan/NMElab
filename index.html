<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYlab Research Gallery</title>
    
    <link rel="stylesheet" href="annotorious.min.css">
    
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #eceff1; overflow: hidden; }
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #cfd8dc; overflow-y: auto; padding: 20px; z-index: 10; }
        .thumb-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 15px; cursor: pointer; }
        .thumb-card img { width: 100%; height: 120px; object-fit: cover; pointer-events: none; }
        .thumb-info { padding: 8px; font-size: 13px; text-align: center; font-weight: bold; }
        #main-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow: hidden; }
        #status-bar { margin-bottom: 15px; padding: 8px 25px; border-radius: 20px; background: #fff; border: 1px solid #cfd8dc; font-size: 14px; }
        #canvas-box { position: relative; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; }
        #current-img { max-width: 100%; max-height: 75vh; display: block; }
        .a9s-annotationlayer { pointer-events: all !important; cursor: crosshair !important; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-top:0;">Sample Gallery</h2>
    <div id="thumb-list"></div>
</div>

<div id="main-container">
    <div id="status-bar">Select a sample to begin</div>
    <div id="canvas-box"></div>
</div>

<script src="annotorious.min.js"></script>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXvg5bavLy1vOyLh-BrLe6PiTfsJyqnnCi-XtVqhYrAOHragk54ciwsNrqAQsUMS0g/exec';
    const FOLDER = 'images'; 
    let anno = null;

    // Check if library actually loaded from your root
    window.onload = () => {
        const status = document.getElementById('status-bar');
        if (typeof Annotorious === 'undefined') {
            status.innerHTML = "<b style='color:red'>Error: annotorious.min.js not found in root!</b>";
        } else {
            console.log("Annotorious Loaded Successfully from local root.");
        }
    };

    // Sidebar
    const list = document.getElementById('thumb-list');
    for (let i = 1; i <= 57; i++) {
        const card = document.createElement('div');
        card.className = 'thumb-card';
        card.innerHTML = `<img src="${FOLDER}/${i}a.jpg" onerror="this.parentElement.style.display='none'"><div class="thumb-info">Sample ${i}</div>`;
        card.onclick = () => selectImage(`Sample ${i}`, `${FOLDER}/${i}.jpg`);
        list.appendChild(card);
    }

    function selectImage(id, imgUrl) {
        const status = document.getElementById('status-bar');
        const canvasBox = document.getElementById('canvas-box');
        status.innerText = `Loading ${id}...`;

        if (anno) { anno.destroy(); anno = null; }
        canvasBox.innerHTML = ''; 

        const img = document.createElement('img');
        img.id = "current-img";
        img.onload = () => {
            setTimeout(() => {
                try {
                    // Initialize using the local library
                    anno = Annotorious.init({ 
                        image: img,
                        widgets: ['COMMENT']
                    });

                    fetch(`${SCRIPT_URL}?imageId=${id}`)
                        .then(r => r.json())
                        .then(data => {
                            anno.setAnnotations(data);
                            status.innerText = `Ready: ${id}`;
                        });

                    anno.on('createAnnotation', async (a) => {
                        status.innerText = "Saving...";
                        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ imageId: id, annotation: a }) });
                        status.innerText = "Saved!";
                    });
                } catch (err) {
                    status.innerText = "Interaction error.";
                    console.error(err);
                }
            }, 150);
        };
        canvasBox.appendChild(img);
        img.src = imgUrl;
    }
</script>
</body>
</html>
