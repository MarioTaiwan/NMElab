<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYlab Alumni & Team Update</title>
    <style>
        :root { --primary: #1a237e; --accent: #1e88e5; --bg: #f4f7f9; --text: #37474f; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 750px; border-top: 8px solid var(--primary); }
        h1 { color: var(--primary); margin: 0 0 10px 0; font-size: 1.8rem; text-align: center; }
        p.intro { text-align: center; margin-bottom: 30px; color: #607d8b; }

        /* Searchable Select Styling */
        .search-container { position: relative; margin-bottom: 25px; }
        #name-search { width: 100%; padding: 12px 15px; border: 2px solid #cfd8dc; border-radius: 8px; font-size: 16px; transition: 0.2s; }
        #name-search:focus { border-color: var(--accent); outline: none; box-shadow: 0 4px 12px rgba(30, 136, 229, 0.1); }
        
        #search-results { 
            position: absolute; width: 100%; max-height: 200px; background: white; 
            border: 1px solid #cfd8dc; border-radius: 8px; overflow-y: auto; 
            z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none;
        }
        .result-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f2f5; font-size: 14px; }
        .result-item:hover { background: #f1f8ff; color: var(--accent); }

        .section-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin: 25px 0 15px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: #455a64; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #cfd8dc; border-radius: 6px; box-sizing: border-box; font-size: 14px; font-family: inherit; }
        
        .photo-preview-wrap { text-align: center; padding: 20px; background: #f8f9fa; border-radius: 10px; margin-bottom: 20px; }
        #current-photo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #eee; }
        .upload-btn { display: inline-block; margin-top: 10px; color: var(--accent); cursor: pointer; font-size: 0.85rem; font-weight: bold; text-decoration: underline; }

        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; margin-top: 30px; transition: 0.2s; }
        .btn-save:hover { background: #0d1440; }
        .btn-save:disabled { background: #90a4ae; }

        #status-msg { text-align: center; margin-top: 20px; font-weight: bold; }
        .saving { color: #f57c00; animation: pulse 1.5s infinite; }
        .success { color: #2e7d32; }
        .hidden { display: none; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h1>MYlab Team Update</h1>
    <p class="intro">Search for your name to begin updating your profile.</p>

    <div class="search-container">
        <label>Search Your Name</label>
        <input type="text" id="name-search" placeholder="Type to search..." autocomplete="off" oninput="filterNames()">
        <div id="search-results"></div>
    </div>

    <div id="main-form" class="hidden">
        <div class="photo-preview-wrap">
            <img id="current-photo" src="" alt="Profile Photo">
            <br>
            <label class="upload-btn">
                Upload New Photo
                <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="previewPhoto()">
            </label>
        </div>

        <div class="section-title">Lab History</div>
        <div class="grid">
            <div class="form-group"><label>Full Name</label><input type="text" id="name"></div>
            <div class="form-group"><label>Office Number</label><input type="text" id="office">
